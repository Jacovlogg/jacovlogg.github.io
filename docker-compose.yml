services:
  jekyll:
    image: ruby:3.3
    command: bash -c "bundle install && bundle exec jekyll serve --host 0.0.0.0 --livereload --force_polling"
    ports:
      - "4000:4000"
      - "35729:35729"  # livereload
    volumes:
      - .:/srv/jekyll
      - bundle_cache:/usr/local/bundle
    working_dir: /srv/jekyll
    environment:
      - JEKYLL_ENV=development

volumes:
  bundle_cache:
